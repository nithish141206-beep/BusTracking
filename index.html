<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusTrack — Real-Time Vehicle Tracking</title>

<!-- Google Fonts: Outfit (display) + DM Sans (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════
   RESET + TOKENS
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080c14;
  --card:      rgba(13, 18, 30, 0.88);
  --border:    rgba(255,255,255,0.08);
  --border-hi: rgba(255,255,255,0.15);
  --accent:    #f97316;
  --accent2:   #fb923c;
  --green:     #22c55e;
  --text-1:    #f1f5f9;
  --text-2:    #94a3b8;
  --text-3:    #4b5768;
  --radius:    14px;
  --radius-sm: 8px;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  overflow: hidden;
}

/* ════════════════════════════════════════
   BACKGROUND — animated mesh + bus image
════════════════════════════════════════ */
body {
  position: relative;
}

.bg-image {
  position: fixed;
  inset: 0;
  background: url('https://images.drivespark.com/img/2024/10/mtc-low-floor-buses-flagged-off-cover-1729060574.jpg') no-repeat center center / cover;
  filter: brightness(0.25) saturate(0.6);
  z-index: 0;
  transform: scale(1.05);
}

/* Subtle animated gradient overlay */
.bg-gradient {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(249,115,22,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(34,197,94,0.06) 0%, transparent 50%),
    linear-gradient(180deg, rgba(8,12,20,0.6) 0%, rgba(8,12,20,0.3) 100%);
  z-index: 1;
  animation: gradientShift 8s ease-in-out infinite alternate;
}
@keyframes gradientShift {
  0%   { opacity: 0.7; }
  100% { opacity: 1; }
}

/* Scanline texture */
.bg-scanlines {
  position: fixed;
  inset: 0;
  z-index: 2;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
}

/* ════════════════════════════════════════
   MAIN CONTAINER
════════════════════════════════════════ */
.page-wrap {
  position: relative;
  z-index: 10;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Brand strip at top */
.brand-strip {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 20;
  padding: 18px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(180deg, rgba(8,12,20,0.9) 0%, transparent 100%);
}
.brand-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: grid;
  place-items: center;
  font-size: 18px;
  box-shadow: 0 0 20px rgba(249,115,22,0.4);
}
.brand-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.5px;
  color: var(--text-1);
}
.brand-tag {
  font-size: 10px;
  color: var(--accent);
  background: rgba(249,115,22,0.12);
  border: 1px solid rgba(249,115,22,0.25);
  border-radius: 20px;
  padding: 2px 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ════════════════════════════════════════
   OVERLAY CARD
════════════════════════════════════════ */
.overlay {
  background: var(--card);
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border: 1px solid var(--border-hi);
  border-radius: 24px;
  padding: 44px 40px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 32px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(249,115,22,0.05);
  animation: cardReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Status chip */
.live-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 1.4s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}

.overlay h1 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 30px;
  letter-spacing: -0.8px;
  line-height: 1.15;
  color: var(--text-1);
  margin-bottom: 8px;
}
.overlay h1 span { color: var(--accent); }

.overlay p {
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 28px;
  line-height: 1.6;
}

/* ════════════════════════════════════════
   SEARCH SECTION
════════════════════════════════════════ */

/* Input group labels */
.input-group-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-3);
  text-align: left;
  margin-bottom: 6px;
  margin-left: 4px;
}

/* ════════ INPUT BOX ════════ */
.input-box {
  position: relative;
  margin: 0 0 10px;
}

.input-box-inner {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: visible;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box-inner:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
}

.input-prefix {
  width: 40px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-size: 14px;
}

input {
  flex: 1;
  padding: 13px 14px 13px 0;
  background: none;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text-1);
  width: 100%;
}
input::placeholder { color: var(--text-3); }

/* Suggestions list */
.list {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: rgba(15, 21, 35, 0.97);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius);
  max-height: 180px;
  overflow-y: auto;
  z-index: 1000;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.list:empty { display: none; }
.list div {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s, color 0.12s;
}
.list div:last-child { border-bottom: none; }
.list div:hover { background: rgba(249,115,22,0.08); color: var(--text-1); }
.list div::before { content: '📍'; font-size: 11px; opacity: 0.5; }

/* Track button */
button#track-btn {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 24px rgba(249,115,22,0.35);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
button#track-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(249,115,22,0.45);
}
button#track-btn:active { transform: scale(0.98); }

/* Footer note */
.footer-note {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.6;
}

/* ════════════════════════════════════════
   STATS STRIP  (decorative, bottom)
════════════════════════════════════════ */
.stats-strip {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 14px 20px;
  background: linear-gradient(0deg, rgba(8,12,20,0.9) 0%, transparent 100%);
}
.stat-item { text-align: center; }
.stat-val { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 10px; color: var(--text-3); letter-spacing: 0.4px; text-transform: uppercase; margin-top: 1px; }
</style>
</head>

<body>

<!-- Background layers -->
<div class="bg-image"></div>
<div class="bg-gradient"></div>
<div class="bg-scanlines"></div>

<!-- Brand strip -->
<div class="brand-strip">
  <div class="brand-icon">🚌</div>
  <div class="brand-name">BusTrack</div>
  <div class="brand-tag">Live</div>
</div>

<!-- Main page -->
<div class="page-wrap">
  <div class="overlay">

    <!-- Live status chip -->
    <div class="live-chip"><div class="live-dot"></div>Real-Time Tracking</div>

    <h1>Find Your <span>Bus</span><br/>Instantly</h1>
    <p>Live GPS tracking across Tamil Nadu.<br/>Select your route and track in real time.</p>

    <!-- Route inputs -->
    <div class="input-group-label">From</div>
    <div class="input-box">
      <div class="input-box-inner">
        <div class="input-prefix">🟢</div>
        <input type="text" id="from" placeholder="Starting point…"
          onkeyup="suggestFrom(this.value)" onclick="suggestFrom(this.value)" autocomplete="off">
      </div>
      <div id="fromList" class="list"></div>
    </div>

    <div class="input-group-label">To</div>
    <div class="input-box">
      <div class="input-box-inner">
        <div class="input-prefix">🔴</div>
        <input type="text" id="to" placeholder="Destination…"
          onkeyup="suggestTo(this.value)" onclick="suggestTo(this.value)" autocomplete="off">
      </div>
      <div id="toList" class="list"></div>
    </div>

    <button id="track-btn" onclick="trackBus()">
      🚌 Track Bus
    </button>

    <div class="footer-note">
      By continuing you agree to our Terms of Service
    </div>

  </div>
</div>

<!-- Stats strip -->
<div class="stats-strip">
  <div class="stat-item"><div class="stat-val">38</div><div class="stat-lbl">Districts</div></div>
  <div class="stat-item"><div class="stat-val">Live</div><div class="stat-lbl">GPS</div></div>
  <div class="stat-item"><div class="stat-val">24/7</div><div class="stat-lbl">Tracking</div></div>
</div>

<script>
/* ══════════════════════════════════════════════
   TRACK BUS
══════════════════════════════════════════════ */
function trackBus() {
  let from = document.getElementById("from").value.trim();
  let to   = document.getElementById("to").value.trim();
  if (from === "" || to === "") {
    alert("Please enter both locations");
    return;
  }
  window.location.href = "map2.html?from=" + encodeURIComponent(from) + "&to=" + encodeURIComponent(to);
}

/* ══════════════════════════════════════════════
   PLACES LIST + SUGGESTIONS
══════════════════════════════════════════════ */
const places = [
"Ariyalur","Chengalpattu","Chennai","Coimbatore","Cuddalore",
"Dharmapuri","Dindigul","Erode","Kallakurichi","Kancheepuram",
"Kanniyakumari","Karur","Krishnagiri","Madurai","Mayiladuthurai",
"Nagapattinam","Namakkal","Perambalur","Pudukkottai",
"Ramanathapuram","Ranipet","Salem","Sivaganga","Tenkasi",
"Thanjavur","Theni","The Nilgiris","Thiruvallur","Thiruvarur",
"Thoothukkudi","Tiruchirappalli","Tirunelveli","Tirupathur",
"Tiruppur","Tiruvannamalai","Vellore","Viluppuram","Virudhunagar",
"Mettupalayam","Pollachi","Valparai","Gudalur","Karamadai",
"Karumathampatti","Madukkarai",
"Townhall","Selvapuram","Rathinapuri","Tatabad","Sivananda Colony",
"Gandhipuram","Ukkadam","Kottaimedu","Ramnagar","Sukrawarpettai",
"R.S Puram","Saibaba Colony","Venkatapuram","Ponnairajapuram",
"Race Course","Gopalapuram","Sidhapudur","Avarampalayam",
"Sundakkamuthur","Podanur","Karumbukadai","Sundarapuram",
"Kurichi","Eachanari","Chettipalayam","Vellalore",
"Kuniyamuthur","Sugunapuram","Kovaipudur","Sokkampudhur",
"Thondamuthur","Madhampatti","Kuppanur",
"Ramnathapuram","Singanallur","Puliakulam","Ondipudur",
"Varadarajapuram","Peelamedu","Meena Estate","Udayampalayam",
"Nanjundapuram","Nehru Nagar","Vilankurichi","Ganapathy",
"Cheranmanagar","Nallampalayam","Gandhimanagar",
"Chinniampalayam","Sowripalayam","G.V Residency","Uppilipalayam",
"Perur","Vadavalli","Veerakeralam","Veedapatti",
"P.N.Pudur","Kalveerampalayam",
"Periyanaickenpalayam","Poochiyur","Ravathakollanur",
"Thadagam","Maruthamalai","Pannimadai",
"Saravanampatti","Kalapatti","Keeranatham","Pachapalayam",
"Annur","Ganesapuram","Kariampalayam","Kovilpalayam","Kurumbapalayam",
"Walayar","K.G Chavadi","Ettimadai","Odaiyakulam",
"Thirumalayampalayam",
"Neelambur","Somanur","Irugur","Sulur",
"Pooluvapatti","Karunya Nagar","Thenkarai","Narasipuram",
"Puthur","Alanthurai",
"Kinathukadavu","Myleripalayam","Nachipalayam",
"Malumichampatti","Othakalmandapam","Samathur",
"Suleeswaranpatti","Annamalai Hills"
];

places.sort();

function suggestFrom(value) { showList(value, "fromList", "from"); }
function suggestTo(value)   { showList(value, "toList",   "to");   }

function showList(value, listId, inputId) {
  let list = value === ""
    ? places
    : places.filter(p => p.toLowerCase().includes(value.toLowerCase()));
  let html = "";
  list.forEach(p => {
    html += `<div onclick="selectPlace('${p}','${inputId}','${listId}')">${p}</div>`;
  });
  document.getElementById(listId).innerHTML = html;
}

function selectPlace(val, inputId, listId) {
  document.getElementById(inputId).value = val;
  document.getElementById(listId).innerHTML = "";
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".input-box")) {
    document.getElementById("fromList").innerHTML = "";
    document.getElementById("toList").innerHTML   = "";
  }
});
</script>

</body>
</html>
